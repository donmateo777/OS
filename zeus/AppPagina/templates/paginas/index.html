{% extends "base.html" %}

{% block titulo %} OS - INICIO SESIÓN {% endblock %}

{% block contenido %} 

<style>
    /* Override de colores verdes a azules para esta vista */
    .navbar-custom {
        border-bottom: 2px solid #00ccff !important;
        box-shadow: 0 0 20px rgba(0, 204, 255, 0.2) !important;
    }
    .nav-link-custom:hover {
        background-color: rgba(0, 204, 255, 0.1) !important;
        color: #00ccff !important;
        text-shadow: 0 0 8px #00ccff !important;
        border-left: 2px solid #00ccff !important;
    }
    .nav-link-custom.active {
        color: #00ccff !important;
        text-shadow: 0 0 10px #00ccff !important;
        border-bottom: 2px solid #00ccff !important;
    }
    h1 {
        text-shadow: 2px 2px 0 #00ccff, -2px -2px 0 #004466 !important;
    }
    .navbar-brand-custom {
        text-shadow: 0 0 10px #00ccff !important;
    }

    /* Estilos del Login */
    .login-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .card-login {
        background: rgba(0, 10, 20, 0.9);
        border: 1px solid #00ccff;
        box-shadow: 0 0 30px rgba(0, 204, 255, 0.15);
        width: 100%;
        max-width: 450px;
        padding: 2rem;
        border-radius: 15px;
        position: relative;
        overflow: hidden;
    }
    .card-login::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 5px;
        background: linear-gradient(90deg, transparent, #00ccff, transparent);
        animation: scan 2s infinite;
    }
    @keyframes scan {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
    }
    .form-label {
        color: #00ccff;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.9rem;
    }
    .form-control-neon {
        background: #050505;
        border: 1px solid #004466;
        color: #fff;
        transition: all 0.3s;
    }
    .form-control-neon:focus {
        background: #000;
        border-color: #00ccff;
        box-shadow: 0 0 15px rgba(0, 204, 255, 0.3);
        color: #fff;
    }
    .btn-neon {
        background: #00ccff;
        color: #000;
        font-family: 'Orbitron', sans-serif;
        font-weight: bold;
        border: none;
        padding: 10px;
        transition: all 0.3s;
        text-transform: uppercase;
        letter-spacing: 1px;
    }
    .btn-neon:hover {
        background: #fff;
        color: #00ccff;
        box-shadow: 0 0 20px #00ccff;
    }
    .social-btn {
        background: transparent;
        border: 1px solid #333;
        color: #ccc;
        transition: all 0.3s;
    }
    .social-btn:hover {
        border-color: #00ccff;
        color: #fff;
        background: rgba(0, 204, 255, 0.1);
    }
    .link-neon {
        color: #0088aa;
        text-decoration: none;
        font-size: 0.9rem;
        transition: all 0.3s;
    }
    .link-neon:hover {
        color: #00ccff;
        text-shadow: 0 0 5px #00ccff;
    }
</style>

<div class="container login-container">
    <div class="card-login">
        <h2 class="text-center mb-4" style="font-family: 'Orbitron', sans-serif; color: #fff; text-shadow: 0 0 10px #00ccff;">OS STORE SOCCER</h2>
        
        <form>
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control form-control-neon" id="email" placeholder="usuario@ejemplo.com">
            </div>
            
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <input type="password" class="form-control form-control-neon" id="password" placeholder="••••••••">
            </div>
            
            <div class="d-flex justify-content-end mb-4">
                <a href="#" class="link-neon">¿Olvidaste tu contraseña?</a>
            </div>
            
            <div class="d-grid gap-2 mb-4">
                <button type="submit" class="btn btn-neon">Iniciar Sesión</button>
            </div>
            
            <div class="text-center mb-3" style="color: #555; font-size: 0.9rem;">
                - O ACCEDER CON -
            </div>
            
            <div class="row g-2 mb-4">
                <div class="col-6">
                    <button type="button" class="btn social-btn w-100">
                        Facebook
                    </button>
                </div>
                <div class="col-6">
                    <button type="button" class="btn social-btn w-100">
                        Gmail
                    </button>
                </div>
            </div>
            
            <div class="text-center mt-3">
                <span style="color: #888;">¿Nuevo en el sistema?</span>
                <a href="{% url 'registro' %}" class="link-neon fw-bold ms-1">Registrarse</a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
