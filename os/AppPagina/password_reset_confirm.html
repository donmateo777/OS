{% extends "base.html" %}
{% load static %}
{% block titulo %} OS - Nueva Contraseña {% endblock %}
{% block extra_css %}
    <link rel="stylesheet" href="{% static 'AppPagina/css/inventario.css' %}">
{% endblock %}
{% block contenido %}
<div class="container login-container">
    <div class="card-login">
        <h2 class="text-center mb-4">NUEVA CONTRASEÑA</h2>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                </div>
            {% endfor %}
            <div class="d-grid mt-4">
                <button type="submit" class="btn btn-neon">Actualizar Contraseña</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
