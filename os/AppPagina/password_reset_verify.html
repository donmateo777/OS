{% extends "base.html" %}
{% load static %}
{% block titulo %} OS - Verificar Código {% endblock %}
{% block extra_css %}
    <link rel="stylesheet" href="{% static 'AppPagina/css/inventario.css' %}">
{% endblock %}
{% block contenido %}
<div class="container login-container">
    <div class="card-login">
        <h2 class="text-center mb-4">VERIFICAR CÓDIGO</h2>
        <p class="text-center mb-4">Introduce el código de 6 dígitos que enviamos a <strong>{{ email }}</strong>.</p>
        <form method="POST">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Código de Seguridad</label>
                <input type="text" name="codigo" class="form-control form-control-neon text-center" style="letter-spacing: 10px; font-size: 1.5rem;" required maxlength="6" placeholder="000000">
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-neon">Verificar Código</button>
                <a href="{% url 'password_reset' %}" class="btn" style="border: 1px solid #ff4444; color: #ff4444; font-family: 'Orbitron', sans-serif;">Reenviar Correo</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
