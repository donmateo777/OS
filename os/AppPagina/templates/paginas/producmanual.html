{% extends "base.html" %}
{% load static %}

{% block titulo %} OS - AGREGAR PRODUCTO {% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'AppPagina/css/producmanual.css' %}">
{% endblock %}

{% block contenido %} 
<div class="container form-container">
    <div class="card-form">
        <h2 class="text-center mb-4" style="font-family: 'Orbitron', sans-serif; color: #fff; text-shadow: 0 0 10px #00ccff;">AGREGAR PRODUCTO MANUALMENTE</h2>
        
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="product_id" class="form-label">ID del Producto</label>
                <input type="text" class="form-control form-control-neon" id="product_id" name="product_id" placeholder="Ej: PROD001" required>
            </div>
            
            <div class="mb-3">
                <label for="product_name" class="form-label">Nombre del Producto</label>
                <input type="text" class="form-control form-control-neon" id="product_name" name="product_name" placeholder="Ej: Procesador Quantum" required>
            </div>

            <div class="row mb-3">
                <div class="col-md-6">
                    <label for="stock" class="form-label">Stock</label>
                    <input type="number" class="form-control form-control-neon" id="stock" name="stock" placeholder="Ej: 50" required>
                </div>
                <div class="col-md-6">
                    <label for="min_stock" class="form-label">Stock Mínimo</label>
                    <input type="number" class="form-control form-control-neon" id="min_stock" name="min_stock" placeholder="Ej: 10" required>
                </div>
            </div>
            
            <div class="mb-4">
                <label for="price" class="form-label">Precio del Producto (Unidad)</label>
                <input type="number" class="form-control form-control-neon" id="price" name="price" placeholder="Ej: 1200.00" step="0.01" required>
            </div>
            
            <div class="d-grid">
                <a href="{% url 'inventario' %}" class="btn btn-neon">Agregar Producto</a>
            </div>
        </form>
        <div class="text-center mt-3">
            <a href="{% url 'inventario' %}" class="link-neon">Volver al Inventario</a>
        </div>
    </div>
</div>
{% endblock %}
