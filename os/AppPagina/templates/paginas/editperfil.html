{% extends "base.html" %}

{% load static %}

{% block titulo %} OS - EDITAR PERFIL {% endblock %}

{% block contenido %}
<style>
    .edit-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 50px 20px;
        min-height: 80vh;
    }

    .edit-card {
        background: rgba(10, 15, 20, 0.95);
        border: 1px solid #00ccff;
        box-shadow: 0 0 30px rgba(0, 204, 255, 0.15);
        border-radius: 15px;
        width: 100%;
        max-width: 700px;
        padding: 40px;
        position: relative;
    }

    .edit-title {
        font-family: 'Orbitron', sans-serif;
        color: #00ccff;
        text-align: center;
        margin-bottom: 30px;
        text-shadow: 0 0 10px rgba(0, 204, 255, 0.4);
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .form-group {
        margin-bottom: 25px;
    }

    .form-label {
        color: #e0e0e0;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.9rem;
        margin-bottom: 8px;
        display: block;
    }

    .form-control-neon {
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid #004466;
        color: #fff;
        width: 100%;
        padding: 12px;
        border-radius: 5px;
        transition: all 0.3s;
        font-family: sans-serif;
    }

    .form-control-neon:focus {
        outline: none;
        border-color: #00ccff;
        box-shadow: 0 0 15px rgba(0, 204, 255, 0.3);
        background: rgba(0, 0, 0, 0.8);
    }

    .section-divider {
        border-top: 1px solid rgba(0, 204, 255, 0.2);
        margin: 35px 0;
        position: relative;
    }
    
    .section-divider span {
        position: absolute;
        top: -12px;
        left: 50%;
        transform: translateX(-50%);
        background: #0b0f14;
        padding: 0 15px;
        color: #0088aa;
        font-family: 'Orbitron', sans-serif;
        font-size: 0.8rem;
    }

    .btn-save {
        background: linear-gradient(45deg, #0088aa, #00ccff);
        border: none;
        color: #000;
        padding: 12px 30px;
        font-family: 'Orbitron', sans-serif;
        font-weight: bold;
        text-transform: uppercase;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s;
        width: 100%;
    }

    .btn-save:hover {
        background: linear-gradient(45deg, #00ccff, #0088aa);
        box-shadow: 0 0 20px rgba(0, 204, 255, 0.6);
        color: #fff;
    }

    .btn-cancel {
        background: transparent;
        border: 1px solid #ff4444;
        color: #ff4444;
        padding: 12px 30px;
        font-family: 'Orbitron', sans-serif;
        font-weight: bold;
        text-transform: uppercase;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.3s;
        width: 100%;
        margin-top: 10px;
        text-align: center;
        display: block;
        text-decoration: none;
    }

    .btn-cancel:hover {
        background: rgba(255, 68, 68, 0.1);
        box-shadow: 0 0 15px rgba(255, 68, 68, 0.3);
        color: #ff6666;
        border-color: #ff6666;
    }
</style>

<div class="edit-wrapper">
    <div class="edit-card">
        <h2 class="edit-title">Configuración de Cuenta</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <!-- Información Personal -->
            <div class="form-group">
                <label for="username" class="form-label">Nombre de Usuario</label>
                <input type="text" id="username" name="username" class="form-control-neon" value="{{ user.username }}" required>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email" id="email" name="email" class="form-control-neon" value="{{ user.email }}" required>
            </div>

            <!-- Separador de Seguridad -->
            <div class="section-divider">
                <span>SEGURIDAD</span>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Nueva Contraseña</label>
                <input type="password" id="password" name="password" class="form-control-neon" placeholder="Dejar vacío para no cambiar">
            </div>

            <div class="form-group">
                <label for="confirm_password" class="form-label">Confirmar Nueva Contraseña</label>
                <input type="password" id="confirm_password" name="confirm_password" class="form-control-neon" placeholder="Repite la contraseña">
            </div>

            <!-- Botones de Acción -->
            <div class="row mt-5">
                <div class="col-md-6 order-md-2 mb-3 mb-md-0">
                    <a href="{% url 'perfil' %}" class="btn-save" style="text-decoration: none; display: block; text-align: center;">Guardar Cambios</a>
                </div>
                <div class="col-md-6 order-md-1">
                    <a href="{% url 'perfil' %}" class="btn-cancel">Cancelar</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
