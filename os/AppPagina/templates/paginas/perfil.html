{% extends "base.html" %}

{% load static %}

{% block titulo %} OS - PERFIL {% endblock %}

{% block contenido %} 
<style>
    /* Estilos para la sección de perfil */
    .profile-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 50px 20px;
        min-height: 70vh;
    }

    .profile-card {
        background: rgba(10, 15, 20, 0.95);
        border: 1px solid #00ccff;
        box-shadow: 0 0 30px rgba(0, 204, 255, 0.15);
        border-radius: 15px;
        width: 100%;
        max-width: 600px;
        overflow: hidden;
        position: relative;
    }

    .profile-header {
        /* Fondo detrás de la foto */
        background: linear-gradient(180deg, rgba(0, 68, 102, 0.8) 0%, rgba(10, 15, 20, 0) 100%);
        padding: 40px 20px;
        text-align: center;
        border-bottom: 1px solid rgba(0, 204, 255, 0.2);
    }

    .profile-avatar {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        border: 3px solid #00ccff;
        box-shadow: 0 0 20px rgba(0, 204, 255, 0.5);
        object-fit: cover;
        margin-bottom: 20px;
        background-color: #000;
        transition: transform 0.3s ease;
    }

    .profile-avatar:hover {
        transform: scale(1.05);
        box-shadow: 0 0 30px rgba(0, 204, 255, 0.8);
    }

    .greeting-text {
        font-family: 'Orbitron', sans-serif;
        color: #e0e0e0;
        font-size: 1.2rem;
        margin: 0;
    }

    .username-text {
        font-family: 'Orbitron', sans-serif;
        color: #00ccff;
        font-size: 2.5rem;
        font-weight: 700;
        text-shadow: 0 0 15px rgba(0, 204, 255, 0.4);
        margin-top: 5px;
        text-transform: uppercase;
    }

    .profile-options {
        padding: 30px;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .option-btn {
        background: rgba(0, 20, 30, 0.6);
        border: 1px solid #004466;
        padding: 15px 20px;
        border-radius: 8px;
        color: #fff;
        text-decoration: none;
        font-family: 'Orbitron', sans-serif;
        font-size: 1.1rem;
        transition: all 0.3s ease;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .option-btn:hover {
        background: rgba(0, 204, 255, 0.15);
        border-color: #00ccff;
        transform: translateX(5px);
        box-shadow: 0 0 15px rgba(0, 204, 255, 0.2);
        color: #00ccff;
    }

    .logout-section {
        margin-top: 20px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
        padding-top: 20px;
    }

    .btn-logout {
        width: 100%;
        background: transparent;
        border: 1px solid #ff4444;
        color: #ff4444;
        padding: 12px;
        font-family: 'Orbitron', sans-serif;
        font-weight: bold;
        text-transform: uppercase;
        border-radius: 8px;
        transition: all 0.3s ease;
        cursor: pointer;
        display: block;
        text-align: center;
        text-decoration: none;
    }

    .btn-logout:hover {
        background: rgba(255, 68, 68, 0.1);
        box-shadow: 0 0 15px rgba(255, 68, 68, 0.3);
        color: #ff6666;
        border-color: #ff6666;
    }
</style>

<div class="profile-wrapper">
    <div class="profile-card">
        <div class="profile-header">
            <!-- Foto de Perfil -->
            <img src="https://ui-avatars.com/api/?name={{ user.username|default:'Usuario' }}&background=00ccff&color=000&size=256" alt="Foto de Perfil" class="profile-avatar">
            
            <p class="greeting-text">Hola</p>
            <h2 class="username-text">{{ user.username|default:"Usuario" }}</h2>
        </div>

        <div class="profile-options">
            <!-- Editar Perfil -->
            <a href="{% url 'editperfil' %}" class="option-btn">
                Editar Perfil
                <span>&#9998;</span>
            </a>

            <!-- Soporte y Ayuda -->
            <a href="#" class="option-btn">
                Soporte y Ayuda
                <span>&#10067;</span>
            </a>

            <!-- Cerrar Sesión -->
            <div class="logout-section">
                <a href="{% url 'index' %}" class="btn-logout">
                    Cerrar Sesión
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
